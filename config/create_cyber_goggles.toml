# Goggles
[goggles]
# Game Mode
[goggles.gameMode]
	#  Enable Goggles
	#  Master switch for goggles
	enableGoggles = true
	#  Enable in Survival
	#  Always enable goggles in Survival mode
	enableInSurvival = true
	#  Enable in Creative
	#  Always enable goggles in Creative mode
	enableInCreative = true
	#  Enable in Spectator
	#  Always enable goggles in Spectator mode
	enableInSpectator = true
	#  Enable in Adventure
	#  Always enable goggles in Adventure mode
	enableInAdventure = true
	#  Enhanced Info Display
	#  Display more information with goggles
	enhancedInfo = true
	#  Hide Static Kinetic Info
	#  Hide kinetic information for static blocks in goggles
	hideStaticKineticInfo = false
	#  Only On With Goggles
	#  Causes most additional display functions to be restricted by goggles
	#  This option is affected by enableGoggles
	onlyOnWithGoggles = true
	#  Better Store Info
	#  Optimize table cloth store info display and interaction logic
	betterStoreInfo = true
	#  Better Factory Gauge
	#  Allows any way to connect and move factory gauges
	betterFactoryGauge = true
	#  Render Kinetic Particles
	#  Render rotation particle effects for target blocks
	enableKineticEffect = true
	#  Disable InScreen Goggles
	#  Disable goggles display when any screen is open
	disableInScreenGoggles = true
	#  Render with Value Box
	#  Allow goggle tooltip rendering when value box is visible
	canRenderOnValueBox = false
	#  Deduplicate Tooltip Lines
	#  Remove adjacent duplicate or near-duplicate lines in goggles tooltip
	dedupTooltipLines = true
	#  Enable Fade Out
	#  Enable smooth fading of item overlay and goggles overlay
	enableFadeOut = true
	#  Precise Numbers
	#  Display more precise numerical values
	preciseNumber = true
	#  Max Fraction Digits
	#  The maximum fraction digits used for precise number
	maxFractionDigits = 2
# Tooltip
[tooltip]
	#  Extra Item Tooltip
	#  Show extra information in item tooltip
	extraItemTooltip = true
	#  Container
	#  Show container content
	container = true
	#  Fluid Container
	#  Show fluid container content
	fluidContainer = true
	#  Clipboard
	#  Enable clipboard custom rendering in first person and tooltip overlay
	clipboard = true
	#  Map
	#  Show additional tooltip information for the map
	map = true
	#  Toolbox
	#  Show toolbox content
	toolbox = true
	#  Ender Chest
	#  Show ender chest content
	enderChest = true
	#  Goggles
	#  Show extra tooltip info for goggles
	goggles = true
	#  Backtank
	#  Show extra tooltip info for backtank
	backtank = true
	#  Diving Boots
	#  Show extra tooltip info for diving boots
	divingBoots = true
	#  Wrench
	#  Show extra tooltip info for wrench
	wrench = true
	#  Linked Controller
	#  Show frequency slots for linked controller
	linkedController = true
	#  List Filter
	#  Show list filter content
	listFilter = true
	#  Attribute Filter
	#  Show attribute filter details
	attributeFilter = true
	#  Package Item
	#  Show package item content
	packageItem = true
	#  Package Entity
	#  Show package entity content
	packageEntity = true
	#  Item Entity
	#  Show carried item info
	itemEntity = true
	#  Deployer
	#  Show deployer overflow items
	deployer = true
	#  Depot
	#  Show depot content
	depot = true
	#  Table Cloth
	#  Show table cloth content
	tableCloth = true
	#  Redstone Requester
	#  Show redstone requester content
	redstoneRequester = true
	#  Crushing Controller
	#  Show crushing controller outputs and progress
	crushingController = true
	#  Millstone
	#  Show extra tooltip info for millstone
	millstone = true
# Overlay
[overlay]
	#  Render Item Overlay
	#  Allow rendering item info overlay on blocks
	renderItemOverlay = true
	#  Overlay Vertical Offset
	#  Vertical offset of item info overlay
	#  Positive: down, Negative: up
	overlayPos = "0, 0"
	#  Tooltip Flag Type
	#  Select the tooltip display type
	tooltipFlagType = "Default"
	#  Tooltip Theme
	#  Select the tooltip theme style
	tooltipTheme = "Default"
	#  Use Custom Color
	#  Enable custom colors for item info overlay
	useCustomColor = false
	#  Background Color
	#  Custom background color
	backgroundColor = 0x00000000
	#  Border Top Color
	#  Custom border top color
	borderTopColor = 0x00000000
	#  Border Bottom Color
	#  Custom border bottom color
	borderBottomColor = 0x00000000
# Drafting View
[overlay.draftingView]
	#  Enable Drafting View
	#  Apply a schematic post-processing effect to the entire screen
	draftingViewEnabled = false
	#  Palette Offset
	#  Horizontal lookup offset (0..1) into the palette texture
	paletteOffset = 0.25
	#  Pixelate
	#  Snap the screen to a coarser virtual grid for a schematic look
	pixelate = true
	#  Pixel Scale
	#  Each virtual pixel covers this many screen pixels (1=off, 4=default, higher=chunkier)
	pixelScale = 4.0
	#  Line Color
	#  Edge outline color
	lineColor = 0x2E3032
	#  Line Shadow Color
	#  Shadow side color for depth-cued outlines
	lineShadowColor = 0x696965
# Outliner
[outliner]
	#  Render Analog Box
	#  Render analog boxes displayed by various blocks
	renderAnalogBox = true
	#  Better Lines
	#  Optimize some rendered connection lines
	betterLine = true
	#  Delay Render Duration
	#  Duration for analog box to continue rendering [Ticks]
	delayRenderDuration = 60
	#  Outward Color
	#  Color displayed when analog box faces outward
	outColor = 0xDDC166
	#  Inward Color
	#  Color displayed when analog box faces inward
	inColor = 0x7FCDE0
	#  Rainbow Debug
	#  Enable rainbow debug mode
	rainbowDebug = false
# Aeronautics
[aeronautics]
	#  Always Show Mass
	#  Show the mass of any blocks
	alwaysShowMass = true
	#  Always Show Friction
	#  Show the friction of any blocks
	alwaysShowFriction = false
	#  Lift Limit Of Handle Range
	#  Lift the limit of the iron handle range
	liftLimitOfHandleRange = false
	#  Custom Handle Move Sublevel Key
	#  Enable custom handle movement Sublevel key
	customHandleMoveSublevelKey = false
	#  Always Allow Riding Rope
	#  Hang on rope without needing a wrench
	alwaysAllowRidingRope = true
# Force Overlay
[aeronautics.forceOverlay]
	#  Enable Force Overlay
	#  Render in-world force arrows and COM marker on targeted sub-levels
	enableForceOverlay = true
	#  Use World Labels
	#  Render floating labels in the world near each force arrow
	useWorldLabels = true
	#  Enable HUD Panel
	#  Show a HUD panel with mass and force magnitudes
	hudPanelEnabled = true
	#  Render Center of Mass
	#  Render the center-of-mass cube marker
	renderCenterOfMass = true
	#  Overlay Position
	#  HUD tooltip position offset
	forceOverlayPos = "0, 0"
	#  Cluster Angle Threshold
	#  Angular variance threshold for force clustering (radians)
	clusterAngleRadians = 0.1
	#  Smoothing Factor
	#  EMA smoothing factor (0=no change, 1=instant)
	smoothingFactor = 0.5
	#  Gravity Arrow Fraction
	#  Gravity arrow length as a fraction of bounding box height
	gravityArrowFraction = 0.5
	#  Arrow Saturation
	#  Controls how large forces map to arrow length (higher = smaller relative to gravity)
	arrowSaturation = 3.0
	#  Min Arrow Length
	#  Minimum arrow length in block units
	minArrowLength = 0.1
	#  Targeting Range
	#  Maximum raycast distance for targeting sub-levels (in chunks)
	targetingChunks = 4
	#  Heartbeat Interval
	#  Ticks between force data requests to the server
	heartbeatIntervalTicks = 10
	#  Min Overlay Pixel Size
	#  Minimum visual size of overlay elements in pixels (0 = camera-dependent sizing)
	minOverlayPixelSize = 0.0
	#  Show Gravity
	#  Render gravity force arrows
	showGravity = true
	#  Show Drag
	#  Render drag force arrows
	showDrag = true
	#  Show Levitation
	#  Render levitation force arrows
	showLevitation = true
	#  Show Balloon Lift
	#  Render balloon lift force arrows
	showBalloonLift = true
	#  Show Propulsion
	#  Render propulsion force arrows
	showPropulsion = true
	#  Show Lift
	#  Render lift force arrows
	showLift = true
	#  Show Magnetic Force
	#  Render magnetic force arrows
	showMagneticForce = true
# Misc
[misc]
# Chain Conveyor
[misc.chainConveyor]
	#  Always Allow Riding Chain
	#  Hang on chain conveyors without needing a wrench
	alwaysAllowRidingChain = false
	#  Prevent Auto Detach
	#  Prevent automatic detachment from chain conveyors due to obstacles
	preventFalling = false
	#  Enhanced Connection
	#  Remove minimum distance and maximum angle limits for chain conveyors
	enhancedConnection = true
	#  Auto Cardboard Yourself
	#  Automatically become a cardboard box when hanging on chains
	cardBoardedYourself = false
# Wrench
[misc.wrench]
	#  Better Encased Cogwheel
	#  Allow right-click to toggle encased cogwheel state with empty hand
	betterEncasedCogwheel = true
	#  Better Encased Pipe
	#  Allow right-click to toggle encased pipe state with empty hand
	betterEncasedPipe = true
	#  Better Chassis
	#  Allow right-click to toggle chassis sticky state with empty hand
	betterChassis = true
	#  Always Show Scroll Value
	#  Always display scroll values on blocks
	alwaysShowScrollValue = true
	#  Always Allow Rotating
	#  Rotate blocks with hotkey without needing a wrench
	alwaysAllowRotating = true
	#  Left Click Fast Dismantle
	#  Instantly dismantle components with left click
	leftClickFastDismantle = true
	#  Remove Cooldown
	#  Remove cooldown for block rotation menu
	removeCooldown = true
	#  Enhanced Rotation Menu
	#  Allow rotation menu to modify more block properties
	#  §cWarning: May be considered cheating on servers
	enchancedRotationMenu = false
	#  Remove Mechanical Arm Limit
	#  Remove distance limit for mechanical arms
	removeMechanicalArmLimit = false
	#  Remove Request Limit
	#  Remove request quantity limit for factory panels and redstone requesters, optimize fast scrolling
	removeRequestLimit = true
	#  Stock Request Quick Actions
	#  Enable quick actions in stock request screen
	stockRequestQuickActions = true
	#  Recursive Schematic Scan
	#  Include schematics in subfolders when refreshing the list
	recursiveSchematicScan = true
	#  Prevent Selection Discard
	#  Prevent discarding selection when switching items
	preventSelectionDiscard = true
	#  Prevent Auto Close Filter
	#  Prevent the filter screen from closing automatically
	preventAutoCloseFilter = false
	#  Infinite Edit Box Length
	#  Infinite edit box length (actually 2^31 - 1)
	infEditBoxLength = false
	#  Remove Cardboard Overlay
	#  Remove cardboard box vision obstruction when sneaking
	removeCardboardOverlay = true
	#  Remove Netherite Backtank First Person
	#  Remove netherite backtank first person rendering effect
	removeNetheriteFirstPerson = false
	#  Allow Diving Boots
	#  Diving boots functionality, disable to make them act like normal boots
	allowDivingBoot = true
	#  Fix Schematic Name
	#  Allow non-ASCII characters when saving schematics
	fixSchematicName = true
	#  Remove Train Damage
	#  Prevent train collisions from dealing damage to players
	removeTrainDamage = false
	#  Enable Negative Infinity Throttle
	#  Allow train throttle to scroll past the normal minimum limit
	enableNegativeInfThrottle = false
	#  Force Flywheel Backend
	#  Force enable Flywheel rendering backend (conflicts with shaders, unless you know what you're doing)
	forcedBackend = false
	#  NBT Fix
	#  Fix crashes caused by NBT being too long, may cause lag
	nbtFix = false
	#  Show Scrap Content
	#  Show specific contents of random scrap in sequenced assembly
	showScrapContent = true
